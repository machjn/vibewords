<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap">
  <title>VibeWord</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      height: 48px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 1rem;
      flex-shrink: 0;
    }

    .logo { font-weight: 800; font-size: 1.1rem; color: var(--accent); letter-spacing: -0.5px; text-decoration: none; }
    .logo:hover { text-decoration: underline; }

    /* ── Room chip ── */
    #room-chip {
      position: relative;
      max-width: 380px;
      justify-self: center;
    }

    .room-chip-bar {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      background: var(--surface-3);
      border: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .room-chip-bar:hover { background: var(--surface-hover); }
    #room-chip.open .room-chip-bar { background: var(--surface-hover); border-color: var(--text-4); }

    #puzzle-title {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #puzzle-author {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: var(--text-2);
      text-align: center;
      margin-top: 0.5rem;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-4);
      flex-shrink: 0;
    }
    #status-dot.connected { background: var(--correct); }
    #status-dot.disconnected { background: var(--error); }

    .room-chip-caret {
      font-size: 0.55rem;
      color: var(--text-3);
      flex-shrink: 0;
      transition: transform 0.15s;
      line-height: 1;
    }
    #room-chip.open .room-chip-caret { transform: rotate(180deg); }

    .room-chip-panel {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 210px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 14px var(--shadow);
      padding: 0.65rem 0.75rem;
      z-index: 50;
    }
    #room-chip.open .room-chip-panel { display: flex; }

    .room-chip-id {
      font-size: 0.75rem;
      color: var(--text-3);
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }
    .room-chip-id code {
      font-family: ui-monospace, monospace;
      color: var(--text-2);
      letter-spacing: 0.03em;
    }

    .room-chip-action {
      display: block;
      padding: 0.3rem 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 0.8rem;
      font-family: inherit;
      color: var(--text-2);
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      transition: background 0.15s;
    }
    .room-chip-action:hover { background: var(--surface-hover); }
    .room-chip-link {
      display: block;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
    }
    .room-chip-link:hover { text-decoration: underline; }
    .room-chip-link.muted {
      color: var(--text-4);
      cursor: default;
      pointer-events: none;
      font-style: italic;
    }

    /* ── Player chips ── */
    #players-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      justify-self: end;
    }

    .player-chip {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.55rem;
      border-radius: 12px;
      font-size: 0.8rem;
      background: var(--surface-3);
      border: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      max-width: 130px;
    }

    .my-chip { border-width: 1.5px; }

    .player-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .player-name {
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-2);
      cursor: default;
    }

    #my-name-el {
      color: var(--text);
      font-weight: 600;
      outline: none;
      min-width: 2ch;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: text;
    }

    #my-name-el:hover:not(:focus) {
      border-bottom: 1px dashed var(--text-4);
    }
    #my-name-el:focus {
      border-bottom: 1px solid var(--accent);
    }


    /* ── Active clue banner ── */
    #clue-banner {
      background: var(--surface);
      color: var(--text);
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 1.25rem;
      font-size: 1rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 0.6rem;
    }

    /* Active clue — shown automatically only when the clue panel is hidden */
    #clue-display {
      background: var(--surface-2);
      color: var(--text);
      padding: 0.45rem 1.25rem;
      font-size: 1rem;
      line-height: 1.4;
      min-height: calc(2 * 1.4em + 2 * 0.45rem);
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      display: none;
    }
    #clue-display:empty::before {
      content: 'Select a clue…';
      color: var(--text-4);
      font-style: italic;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.75rem;
      background: var(--surface-3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      pointer-events: none;
    }
    .action-btn:hover:not(:disabled) { background: var(--surface-hover); }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .action-btn.active { background: var(--warning); border-color: var(--warning); color: white; }
    #pencil-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    #pencil-btn.active:hover { background: var(--accent-2); border-color: var(--accent-2); }
    #export-btn { background: var(--accent); border-color: var(--accent); color: white; }
    #export-btn:hover { background: var(--accent-2); border-color: var(--accent-2); }

    .btn-sep {
      width: 1px;
      align-self: stretch;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 0.1rem;
    }

    /* Pass cursor events through inputs while RMB is held so the body cursor shows */
    body.rmb-active .cell input { pointer-events: none; }

    /* Hide pencil marks when toggle is off */
    #crossword-grid.hide-pencil input.pencil { color: transparent; }

    /* Pencil and revealed letter styles */
    .cell input.pencil {
      color: var(--pencil);
      font-style: italic;
      font-weight: 400;
    }
    .cell input.revealed { color: var(--error); }
    /* word-correct after revealed so green wins when a revealed word is complete */
    .cell input.word-correct { color: var(--correct); }
    .clue-item.word-correct { color: var(--correct); font-weight: 600; }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Grid area ── */
    .grid-area {
      flex: 1;
      min-height: 0;
      overflow: auto;  /* scroll container only — no centering here */
    }

    /* Inner wrapper handles centering without breaking scroll */
    .grid-centering {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 1.5rem;
    }

    #crossword-grid {
      display: grid;
      gap: 1px;
      border: 2px solid var(--grid-line);
      background: var(--grid-line);
      flex-shrink: 0;
    }

    .cell {
      width: 38px;
      height: 38px;
      position: relative;
      background: var(--grid-bg);
    }

    .cell.black { background: var(--grid-black); }

    .cell-number {
      position: absolute;
      top: 1px;
      left: 2px;
      font-size: 9px;
      font-weight: 600;
      color: var(--grid-number);
      line-height: 1;
      pointer-events: none;
      z-index: 2;
      user-select: none;
    }

    .cell input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--grid-letter);
      text-transform: uppercase;
      cursor: pointer;
      caret-color: transparent;
      outline: none;
      padding: 0;
      font-family: inherit;
      z-index: 1;
    }

    /* Per-player selection overlays (word = light, cursor cell = dark) */
    .sel-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Clue panel ── */
    .clue-panel {
      width: clamp(240px, 28vw, 450px);
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* Drag handle on the left edge of the panel */
    .clue-resize-handle {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: transparent;
      position: relative;
      transition: background 0.15s;
    }
    .clue-resize-handle:hover,
    .clue-resize-handle.dragging { background: var(--accent-subtle); }
    .clue-resize-handle::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 28px;
      background: var(--border);
      border-radius: 1px;
    }
    .clue-resize-handle:hover::after,
    .clue-resize-handle.dragging::after { background: var(--accent); }

    /* The scrollable content area inside the panel */
    .clue-panel-inner {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      container-type: inline-size;
    }


    .clue-sections-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .clue-section {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.75rem 0;
    }

    .clue-section + .clue-section {
      border-top: 1px solid var(--border);
    }

    .clue-section h3 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      padding: 0 0.75rem 0.4rem;
    }

    /* Columns when the panel is wide enough; rows when narrow */
    @container (min-width: 320px) {
      .clue-sections-wrap { flex-direction: row; }
      .clue-sections-wrap .clue-section + .clue-section {
        border-top: none;
        border-left: 1px solid var(--border);
      }
      .clue-sections-wrap .clue-section h3 {
        position: sticky;
        top: 0;
        background: var(--surface);
        z-index: 1;
        padding-top: 0.3rem;
        padding-bottom: 0.3rem;
        border-bottom: 1px solid var(--border);
      }
      .clue-sections-wrap .clue-item {
        padding: 0.18rem 0.5rem;
      }
    }

    .clue-section ul { list-style: none; }

    .clue-item {
      padding: 0.35rem 0.75rem;
      font-size: 0.95rem;
      line-height: 1.4;
      cursor: pointer;
      color: var(--text-2);
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }

    .clue-item:hover { background: var(--bg); }

    /* background + border-color applied via JS using the player's colour */
    .clue-item.active { font-weight: 600; }

    .clue-num { font-weight: 700; margin-right: 0.25rem; }

    /* ── Disconnected overlay ── */
    #disconnected-banner {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #disconnected-banner.show { display: flex; }
    #disconnected-banner div {
      background: var(--surface);
      border-radius: 10px;
      padding: 2rem;
      text-align: center;
    }
    #disconnected-banner h2 { margin-bottom: 0.5rem; }
    #disconnected-banner p { color: var(--text-3); margin-bottom: 1rem; }
    #disconnected-banner button {
      padding: 0.5rem 1.25rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    /* ── Settings panel ── */
    #settings-wrap {
      position: relative;
      margin-left: auto;
    }
    #settings-panel {
      display: none;
      flex-direction: column;
      gap: 0.15rem;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 195px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 14px var(--shadow);
      padding: 0.4rem;
      z-index: 50;
    }
    #settings-wrap.open #settings-panel { display: flex; }
    .settings-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      width: 100%;
      padding: 0.35rem 0.65rem;
      background: none;
      border: none;
      border-radius: 5px;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--text-2);
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
      transition: background 0.1s;
    }
    .settings-item:hover { background: var(--bg); }
    .settings-item::before {
      content: '';
      display: inline-block;
      width: 13px;
      height: 13px;
      border-radius: 3px;
      border: 1.5px solid var(--text-4);
      flex-shrink: 0;
    }
    .settings-item.active::before { background: var(--accent); border-color: var(--accent); }

    /* ── Players dropdown (collapsed state) ── */
    #players-bar { position: relative; }
    .players-dropdown {
      display: none;
      flex-direction: column;
      gap: 0.3rem;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 14px var(--shadow);
      padding: 0.4rem 0.5rem;
      z-index: 50;
      min-width: 140px;
    }
    #players-bar.expanded .players-dropdown { display: flex; }
    .players-summary { cursor: pointer; }

    /* Stack clue panel below grid on medium-width screens */
    @media (max-width: 800px) {
      header { padding: 0 0.75rem; column-gap: 0.5rem; height: 44px; }

      .main { flex-direction: column; }
      .clue-panel {
        width: 100%;
        height: 36vh;
        min-height: 160px;
        border-left: none;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .clue-resize-handle { display: none; }
      .clue-sections-wrap { flex-direction: row; }
      .clue-sections-wrap .clue-section + .clue-section {
        border-top: none;
        border-left: 1px solid var(--border);
      }
      .clue-sections-wrap .clue-section h3 {
        position: sticky;
        top: 0;
        background: var(--surface);
        z-index: 1;
        padding-top: 0.3rem;
        padding-bottom: 0.3rem;
        border-bottom: 1px solid var(--border);
      }
    }

    /* Collapse action bar to icon-only on mobile */
    @media (max-width: 600px) {
      .btn-label { display: none; }
      .action-btn { padding: 0.3rem 0.4rem; }
    }

    /* Extra-narrow: abbreviate logo, drop player-count label */
    @media (max-width: 380px) {
      .logo { font-size: 0; }
      .logo::after { content: 'VW'; font-size: 1.1rem; letter-spacing: -0.5px; }
      .players-summary .player-name { display: none; }
    }

    /* Collapse clue panel entirely on narrow screens; grid fills the view */
    @media (max-width: 520px) {
      .clue-panel { display: none; }
      /* Top-align the grid so the virtual keyboard doesn't cover it */
      .grid-centering { justify-content: flex-start; }
      /* Show active clue bar only when the clue panel is hidden */
      #clue-display { display: block; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">VibeWord</a>
    <div id="room-chip" class="room-chip">
      <div class="room-chip-bar">
        <div id="status-dot" title="Connecting…"></div>
        <span id="puzzle-title">Loading…</span>
        <span class="room-chip-caret">&#9660;</span>
      </div>
      <div class="room-chip-panel">
        <div class="room-chip-id">Room <code id="room-id-display"></code></div>
        <button id="share-btn" class="room-chip-action">Copy Room Link</button>
        <button id="export-btn" class="room-chip-action">&#11015; Export .ipuz</button>
        <a id="source-link" href="/rooms" class="room-chip-link" target="_blank" rel="noopener" style="display:none">Original puzzle</a>
        <a id="solutions-link" class="room-chip-link muted" target="_blank" rel="noopener">Solutions (15²): searching…</a>
        <a href="/rooms" class="room-chip-link">All rooms</a>
      </div>
    </div>
    <div id="players-bar"></div>
  </header>

  <div id="clue-banner">
    <button class="action-btn" id="reveal-letter-btn" disabled title="Reveal the letter in the selected cell">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/></svg>
      <span class="btn-label">Reveal letter</span>
    </button>
    <button class="action-btn" id="reveal-word-btn" disabled title="Reveal all letters in the selected word">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
      <span class="btn-label">Reveal word</span>
    </button>
    <button class="action-btn" id="check-btn" disabled title="Remove wrong letters in the selected word">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
      <span class="btn-label">Check</span>
    </button>
    <button class="action-btn" id="check-all-btn" disabled title="Remove all wrong letters in the grid">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg>
      <span class="btn-label">Check all</span>
    </button>
    <button class="action-btn" id="clear-btn" disabled title="Clear non-crossing letters in the selected word">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21"/><path d="m5.082 11.09 8.828 8.828"/></svg>
      <span class="btn-label">Clear</span>
    </button>
    <span class="btn-sep"></span>
    <button class="action-btn" id="pencil-btn" title="Toggle between pen and pencil mode">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
      <span class="btn-label">Pencil</span>
    </button>
    <div id="settings-wrap">
      <button class="action-btn" id="settings-btn" title="Display settings">&#9881;</button>
      <div id="settings-panel">
        <button id="show-pencil-btn" class="settings-item active">Show pencil marks</button>
        <button id="others-btn" class="settings-item active">Show other players</button>
      </div>
    </div>
  </div>
