<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap">
  <title>VibeWord</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 1.25rem;
      height: 48px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 1rem;
      flex-shrink: 0;
    }

    .logo { font-weight: 800; font-size: 1.1rem; color: #3498db; letter-spacing: -0.5px; text-decoration: none; }
    .logo:hover { text-decoration: underline; }

    /* ── Room chip ── */
    #room-chip {
      position: relative;
      max-width: 380px;
      justify-self: center;
    }

    .room-chip-bar {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .room-chip-bar:hover { background: #e6e6e6; }
    #room-chip.open .room-chip-bar { background: #e6e6e6; border-color: #bbb; }

    #puzzle-title {
      font-weight: 600;
      font-size: 0.85rem;
      color: #1a1a1a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #puzzle-author {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: #333;
      text-align: center;
      margin-top: 0.5rem;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    #status-dot.connected { background: #2ecc71; }
    #status-dot.disconnected { background: #e74c3c; }

    .room-chip-caret {
      font-size: 0.55rem;
      color: #888;
      flex-shrink: 0;
      transition: transform 0.15s;
      line-height: 1;
    }
    #room-chip.open .room-chip-caret { transform: rotate(180deg); }

    .room-chip-panel {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 210px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      padding: 0.65rem 0.75rem;
      z-index: 50;
    }
    #room-chip.open .room-chip-panel { display: flex; }

    .room-chip-id {
      font-size: 0.75rem;
      color: #888;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .room-chip-id code {
      font-family: ui-monospace, monospace;
      color: #444;
      letter-spacing: 0.03em;
    }

    .room-chip-action {
      display: block;
      padding: 0.3rem 0.6rem;
      background: #f5f5f0;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      font-size: 0.8rem;
      font-family: inherit;
      color: #333;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      transition: background 0.15s;
    }
    .room-chip-action:hover { background: #e8e8e4; }
    .room-chip-link {
      display: block;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      color: #4a7cb5;
      text-decoration: none;
    }
    .room-chip-link:hover { text-decoration: underline; }
    .room-chip-link.muted {
      color: #aaa;
      cursor: default;
      pointer-events: none;
      font-style: italic;
    }

    /* ── Player chips ── */
    #players-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      justify-self: end;
    }

    .player-chip {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.55rem;
      border-radius: 12px;
      font-size: 0.8rem;
      background: #f0f0f0;
      border: 1px solid #ddd;
      white-space: nowrap;
      overflow: hidden;
      max-width: 130px;
    }

    .my-chip { border-width: 1.5px; }

    .player-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .player-name {
      overflow: hidden;
      text-overflow: ellipsis;
      color: #444;
      cursor: default;
    }

    #my-name-el {
      color: #1a1a1a;
      font-weight: 600;
      outline: none;
      min-width: 2ch;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: text;
    }

    #my-name-el:hover:not(:focus) {
      border-bottom: 1px dashed #bbb;
    }
    #my-name-el:focus {
      border-bottom: 1px solid #3498db;
    }


    /* ── Active clue banner ── */
    #clue-banner {
      background: #1a1a1a;
      color: white;
      padding: 0.4rem 1.25rem;
      font-size: 1rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 0.6rem;
    }

    /* Active clue — shown automatically only when the clue panel is hidden */
    #clue-display {
      background: #2a2a2a;
      color: #ccc;
      padding: 0.45rem 1.25rem;
      font-size: 1rem;
      line-height: 1.4;
      min-height: calc(2 * 1.4em + 2 * 0.45rem);
      flex-shrink: 0;
      border-top: 1px solid #3a3a3a;
      display: none;
    }
    #clue-display:empty::before {
      content: 'Select a clue…';
      color: #555;
      font-style: italic;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.75rem;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 4px;
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      pointer-events: none;
    }
    .action-btn:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .action-btn.active { background: #e67e22; border-color: #e67e22; }
    #pencil-btn.active { background: #3498db; border-color: #3498db; }
    #pencil-btn.active:hover { background: #2980b9; border-color: #2980b9; }
    #export-btn { background: #5dade2; border-color: #5dade2; }
    #export-btn:hover { background: #3498db; border-color: #3498db; }

    .btn-sep {
      width: 1px;
      align-self: stretch;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      margin: 0 0.1rem;
    }

    /* Pass cursor events through inputs while RMB is held so the body cursor shows */
    body.rmb-active .cell input { pointer-events: none; }

    /* Hide pencil marks when toggle is off */
    #crossword-grid.hide-pencil input.pencil { color: transparent; }

    /* Pencil and revealed letter styles */
    .cell input.pencil {
      color: #7f8c8d;
      font-style: italic;
      font-weight: 400;
    }
    .cell input.revealed { color: #e74c3c; }
    /* word-correct after revealed so green wins when a revealed word is complete */
    .cell input.word-correct { color: #27ae60; }
    .clue-item.word-correct { color: #27ae60; font-weight: 600; }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Grid area ── */
    .grid-area {
      flex: 1;
      min-height: 0;
      overflow: auto;  /* scroll container only — no centering here */
    }

    /* Inner wrapper handles centering without breaking scroll */
    .grid-centering {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 1.5rem;
    }

    #crossword-grid {
      display: grid;
      gap: 1px;
      border: 2px solid #1a1a1a;
      background: #1a1a1a;
      flex-shrink: 0;
    }

    .cell {
      width: 38px;
      height: 38px;
      position: relative;
      background: white;
    }

    .cell.black { background: #1a1a1a; }

    .cell-number {
      position: absolute;
      top: 1px;
      left: 2px;
      font-size: 9px;
      font-weight: 600;
      color: #333;
      line-height: 1;
      pointer-events: none;
      z-index: 2;
      user-select: none;
    }

    .cell input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      text-transform: uppercase;
      cursor: pointer;
      caret-color: transparent;
      outline: none;
      padding: 0;
      font-family: inherit;
      z-index: 1;
    }

    /* Per-player selection overlays (word = light, cursor cell = dark) */
    .sel-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Clue panel ── */
    .clue-panel {
      width: clamp(240px, 28vw, 450px);
      flex-shrink: 0;
      background: white;
      border-left: 1px solid #e0e0e0;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* Drag handle on the left edge of the panel */
    .clue-resize-handle {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: transparent;
      position: relative;
      transition: background 0.15s;
    }
    .clue-resize-handle:hover,
    .clue-resize-handle.dragging { background: rgba(52,152,219,0.12); }
    .clue-resize-handle::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 28px;
      background: #d0d0d0;
      border-radius: 1px;
    }
    .clue-resize-handle:hover::after,
    .clue-resize-handle.dragging::after { background: #3498db; }

    /* The scrollable content area inside the panel */
    .clue-panel-inner {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      container-type: inline-size;
    }


    .clue-sections-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .clue-section {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.75rem 0;
    }

    .clue-section + .clue-section {
      border-top: 1px solid #e0e0e0;
    }

    .clue-section h3 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      padding: 0 0.75rem 0.4rem;
    }

    /* Columns when the panel is wide enough; rows when narrow */
    @container (min-width: 320px) {
      .clue-sections-wrap { flex-direction: row; }
      .clue-sections-wrap .clue-section + .clue-section {
        border-top: none;
        border-left: 1px solid #e0e0e0;
      }
      .clue-sections-wrap .clue-section h3 {
        position: sticky;
        top: 0;
        background: white;
        z-index: 1;
        padding-top: 0.3rem;
        padding-bottom: 0.3rem;
        border-bottom: 1px solid #f0f0f0;
      }
      .clue-sections-wrap .clue-item {
        padding: 0.18rem 0.5rem;
      }
    }

    .clue-section ul { list-style: none; }

    .clue-item {
      padding: 0.35rem 0.75rem;
      font-size: 0.95rem;
      line-height: 1.4;
      cursor: pointer;
      color: #333;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }

    .clue-item:hover { background: #f5f5f0; }

    /* background + border-color applied via JS using the player's colour */
    .clue-item.active { font-weight: 600; }

    .clue-num { font-weight: 700; margin-right: 0.25rem; }

    /* ── Disconnected overlay ── */
    #disconnected-banner {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #disconnected-banner.show { display: flex; }
    #disconnected-banner div {
      background: white;
      border-radius: 10px;
      padding: 2rem;
      text-align: center;
    }
    #disconnected-banner h2 { margin-bottom: 0.5rem; }
    #disconnected-banner p { color: #666; margin-bottom: 1rem; }
    #disconnected-banner button {
      padding: 0.5rem 1.25rem;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    /* ── Settings panel ── */
    #settings-wrap {
      position: relative;
      margin-left: auto;
    }
    #settings-panel {
      display: none;
      flex-direction: column;
      gap: 0.15rem;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 195px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      padding: 0.4rem;
      z-index: 50;
    }
    #settings-wrap.open #settings-panel { display: flex; }
    .settings-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      width: 100%;
      padding: 0.35rem 0.65rem;
      background: none;
      border: none;
      border-radius: 5px;
      font-size: 0.88rem;
      font-family: inherit;
      color: #333;
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
      transition: background 0.1s;
    }
    .settings-item:hover { background: #f5f5f0; }
    .settings-item::before {
      content: '';
      display: inline-block;
      width: 13px;
      height: 13px;
      border-radius: 3px;
      border: 1.5px solid #ccc;
      flex-shrink: 0;
    }
    .settings-item.active::before { background: #3498db; border-color: #3498db; }

    /* ── Players dropdown (collapsed state) ── */
    #players-bar { position: relative; }
    .players-dropdown {
      display: none;
      flex-direction: column;
      gap: 0.3rem;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      padding: 0.4rem 0.5rem;
      z-index: 50;
      min-width: 140px;
    }
    #players-bar.expanded .players-dropdown { display: flex; }
    .players-summary { cursor: pointer; }

    /* Stack clue panel below grid on medium-width screens */
    @media (max-width: 800px) {
      header { padding: 0 0.75rem; column-gap: 0.5rem; height: 44px; }

      .main { flex-direction: column; }
      .clue-panel {
        width: 100%;
        height: 36vh;
        min-height: 160px;
        border-left: none;
        border-top: 1px solid #e0e0e0;
        flex-shrink: 0;
      }
      .clue-resize-handle { display: none; }
      .clue-sections-wrap { flex-direction: row; }
      .clue-sections-wrap .clue-section + .clue-section {
        border-top: none;
        border-left: 1px solid #e0e0e0;
      }
      .clue-sections-wrap .clue-section h3 {
        position: sticky;
        top: 0;
        background: white;
        z-index: 1;
        padding-top: 0.3rem;
        padding-bottom: 0.3rem;
        border-bottom: 1px solid #f0f0f0;
      }
    }

    /* Collapse action bar to icon-only on mobile */
    @media (max-width: 600px) {
      .btn-label { display: none; }
      .action-btn { padding: 0.3rem 0.4rem; }
    }

    /* Extra-narrow: abbreviate logo, drop player-count label */
    @media (max-width: 380px) {
      .logo { font-size: 0; }
      .logo::after { content: 'VW'; font-size: 1.1rem; letter-spacing: -0.5px; }
      .players-summary .player-name { display: none; }
    }

    /* Collapse clue panel entirely on narrow screens; grid fills the view */
    @media (max-width: 520px) {
      .clue-panel { display: none; }
      /* Top-align the grid so the virtual keyboard doesn't cover it */
      .grid-centering { justify-content: flex-start; }
      /* Show active clue bar only when the clue panel is hidden */
      #clue-display { display: block; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">VibeWord</a>
    <div id="room-chip" class="room-chip">
      <div class="room-chip-bar">
        <div id="status-dot" title="Connecting…"></div>
        <span id="puzzle-title">Loading…</span>
        <span class="room-chip-caret">&#9660;</span>
      </div>
      <div class="room-chip-panel">
        <div class="room-chip-id">Room <code id="room-id-display"></code></div>
        <button id="share-btn" class="room-chip-action">Copy Room Link</button>
        <button id="export-btn" class="room-chip-action">&#11015; Export .ipuz</button>
        <a id="source-link" href="/rooms" class="room-chip-link" target="_blank" rel="noopener" style="display:none">Original puzzle</a>
        <a id="solutions-link" class="room-chip-link muted" target="_blank" rel="noopener">Solutions (15²): searching…</a>
        <a href="/rooms" class="room-chip-link">All rooms</a>
      </div>
    </div>
    <div id="players-bar"></div>
  </header>

  <div id="clue-banner">
    <button class="action-btn" id="reveal-letter-btn" disabled title="Reveal the letter in the selected cell">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/></svg>
      <span class="btn-label">Reveal letter</span>
    </button>
    <button class="action-btn" id="reveal-word-btn" disabled title="Reveal all letters in the selected word">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
      <span class="btn-label">Reveal word</span>
    </button>
    <button class="action-btn" id="check-btn" disabled title="Remove wrong letters in the selected word">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
      <span class="btn-label">Check</span>
    </button>
    <button class="action-btn" id="check-all-btn" disabled title="Remove all wrong letters in the grid">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg>
      <span class="btn-label">Check all</span>
    </button>
    <button class="action-btn" id="clear-btn" disabled title="Clear non-crossing letters in the selected word">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21"/><path d="m5.082 11.09 8.828 8.828"/></svg>
      <span class="btn-label">Clear</span>
    </button>
    <span class="btn-sep"></span>
    <button class="action-btn" id="pencil-btn" title="Toggle between pen and pencil mode">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
      <span class="btn-label">Pencil</span>
    </button>
    <div id="settings-wrap">
      <button class="action-btn" id="settings-btn" title="Display settings">&#9881;</button>
      <div id="settings-panel">
        <button id="show-pencil-btn" class="settings-item active">Show pencil marks</button>
        <button id="others-btn" class="settings-item active">Show other players</button>
      </div>
    </div>
  </div>

  <div id="clue-display"></div>

  <div class="main">
    <div class="grid-area">
      <div class="grid-centering">
        <div id="crossword-grid"></div>
        <div id="puzzle-author"></div>
      </div>
    </div>

    <div class="clue-panel" id="clue-panel">
      <div class="clue-resize-handle" id="clue-resize-handle"></div>
      <div class="clue-panel-inner">
        <div class="clue-sections-wrap" id="clue-sections-wrap">
          <div class="clue-section">
            <h3>Across</h3>
            <ul id="across-clues"></ul>
          </div>
          <div class="clue-section">
            <h3>Down</h3>
            <ul id="down-clues"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="disconnected-banner">
    <div>
      <h2>Disconnected</h2>
      <p>Lost connection to the server.</p>
      <button onclick="location.reload()">Reconnect</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
