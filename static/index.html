<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/theme.css">
  <title>VibeWord</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 1.5rem 1rem;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .tagline {
      color: var(--text-3);
      font-size: 1rem;
      margin-top: 0.25rem;
    }

    .col {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px var(--shadow);
    }

    /* ── Rooms button ── */
    .rooms-btn {
      display: block;
      width: 100%;
      max-width: 420px;
      padding: 0.7rem 1rem;
      background: var(--accent);
      color: var(--surface-2);
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .rooms-btn:hover { background: var(--accent-2); }

    /* ── Card heading ── */
    .card-heading {
      padding: 1rem 1.75rem 0.85rem;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      border-bottom: 2px solid var(--border);
    }

    /* ── Sections ── */
    .section {
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child { border-bottom: none; }

    .section-label {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .section-label span {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }

    .section-hint {
      font-size: 0.72rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text-4);
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    select, .text-input {
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      background: var(--surface);
    }

    select:focus, .text-input:focus { border-color: var(--accent); }
    .text-input::placeholder { color: var(--text-4); }

    .select-scraper { flex: 0 0 auto; min-width: 0; }
    .input-date     { flex: 1; min-width: 0; }
    .input-url      { flex: 1; min-width: 0; }

    /* ── File upload ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .upload-icon { font-size: 1.5rem; margin-bottom: 0.35rem; }

    .upload-zone p {
      color: var(--text-3);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .upload-zone strong { color: var(--text); }
    .upload-zone input[type="file"] { display: none; }

    /* ── Shared ── */
    .btn {
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: var(--surface-2);
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn:hover { background: var(--accent-2); }
    .btn:disabled { background: var(--text-3); cursor: not-allowed; }

    .status {
      font-size: 0.82rem;
      margin-top: 0.55rem;
      min-height: 1.1em;
    }
    .status.error   { color: var(--error); }
    .status.loading { color: var(--accent); }

    /* URL section dims when no URL-capable scraper is selected */
    .section.dimmed { opacity: 0.4; pointer-events: none; }

    @media (max-width: 360px) {
      .input-row { flex-wrap: wrap; }
      .input-row .btn { width: 100%; }
    }

  </style>
</head>
<body>
  <div class="col">
    <div class="logo">Vibe<span>Word</span></div>
    <p class="tagline">Collaborative crosswords, in real time</p>
  </div>

  <a href="/rooms" class="rooms-btn">View active rooms</a>

  <div class="card">
    <div class="card-heading">Create a room</div>

    <!-- ── By date ── -->
    <div class="section">
      <div class="section-label">
        <span>Scrape crossword by date</span>
      </div>
      <div class="input-row" style="margin-bottom:0.5rem">
        <select id="source-select" style="flex:1"></select>
        <select id="type-select" style="flex:1"></select>
      </div>
      <p id="schedule-hint" class="section-hint" style="margin-bottom:0.4rem;min-height:1em"></p>
      <div class="input-row">
        <input class="text-input input-date" type="date" id="date-input">
        <button class="btn" id="date-btn">Go</button>
      </div>
      <p class="status" id="date-status"></p>
    </div>

    <!-- ── By URL ── -->
    <div class="section" id="url-section">
      <div class="section-label">
        <span>Scrape crossword from URL</span>
        <span class="section-hint" id="url-hint"></span>
      </div>
      <div class="input-row">
        <input class="text-input input-url" type="text" id="url-input"
               placeholder="https://www.theguardian.com/crosswords/… or 30013">
        <button class="btn" id="url-btn">Go</button>
      </div>
      <p class="status" id="url-status"></p>
    </div>

    <!-- ── File upload ── -->
    <div class="section">
      <div class="section-label"><span>Upload .ipuz</span></div>
      <div class="upload-zone" id="drop-zone">
        <div class="upload-icon">&#9635;</div>
        <p><strong>Drop an .ipuz file here</strong><br>or click to choose one</p>
        <input type="file" id="file-input" accept=".ipuz,application/json">
      </div>
      <p class="status" id="file-status"></p>
    </div>

  </div>


  <div class="corner-bar">
    <button class="theme-btn" data-theme-btn onclick="openThemePicker(event)" title="Choose theme" aria-label="Choose theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
    </button>
    <a href="https://github.com/machjn/vibeword" class="github-link" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      machjn/vibeword
    </a>
  </div>

  <script>
    // ── Scraper metadata ──────────────────────────────────────────────────

    let scrapers = [];
    let sources  = {};  // { source_id: { name, types: [scraper, …] } }

    async function loadScrapers() {
      const res = await fetch('/api/scrapers');
      scrapers = await res.json();

      sources = {};
      for (const s of scrapers) {
        if (!sources[s.source]) sources[s.source] = { name: s.source_name, types: [] };
        sources[s.source].types.push(s);
      }

      const sourceSel = document.getElementById('source-select');
      sourceSel.innerHTML = Object.entries(sources).map(([id, src]) =>
        `<option value="${id}">${src.name}</option>`
      ).join('');

      updateTypeDropdown();
    }

    function updateTypeDropdown() {
      const sourceId = document.getElementById('source-select').value;
      const typeSel  = document.getElementById('type-select');
      typeSel.innerHTML = (sources[sourceId]?.types || []).map(s =>
        `<option value="${s.id}">${s.name}</option>`
      ).join('');
      updateScheduleHint();
      updateUrlSection();
    }

    function updateScheduleHint() {
      const scraper = selectedDateScraper();
      document.getElementById('schedule-hint').textContent =
        scraper?.schedule ? `Publishes ${scraper.schedule}` : '';
    }

    function selectedDateScraper() {
      const id = document.getElementById('type-select').value;
      return scrapers.find(s => s.id === id) || null;
    }

    function updateUrlSection() {
      const urlCapable = scrapers.filter(s => s.supports_url);
      const section = document.getElementById('url-section');
      const hint    = document.getElementById('url-hint');

      if (urlCapable.length === 0) {
        section.classList.add('dimmed');
        hint.textContent = '';
        return;
      }

      section.classList.remove('dimmed');
      const sourceNames = [...new Set(urlCapable.map(s => s.source_name))];
      hint.textContent = '(' + sourceNames.join(', ') + ')';
    }

    document.getElementById('source-select').addEventListener('change', updateTypeDropdown);
    document.getElementById('type-select').addEventListener('change', updateScheduleHint);

    // ── By date ───────────────────────────────────────────────────────────

    const dateInput  = document.getElementById('date-input');
    const dateBtn    = document.getElementById('date-btn');
    const dateStatus = document.getElementById('date-status');

    // Default to today; cap max at today since future puzzles aren't published yet
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;
    dateInput.max   = today;

    async function createFromDate() {
      const scraper = document.getElementById('type-select').value;
      const d = dateInput.value;
      if (!scraper || !d) return;

      setStatus(dateStatus, 'loading', 'Fetching crossword…');
      dateBtn.disabled = true;

      try {
        const res = await fetch('/api/rooms/date', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scraper, date: d }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to create room');
        location.href = `/room/${data.room_id}`;
      } catch (err) {
        setStatus(dateStatus, 'error', err.message);
        dateBtn.disabled = false;
      }
    }

    dateBtn.addEventListener('click', createFromDate);
    dateInput.addEventListener('keydown', e => { if (e.key === 'Enter') createFromDate(); });

    // ── By URL ────────────────────────────────────────────────────────────

    const urlInput  = document.getElementById('url-input');
    const urlBtn    = document.getElementById('url-btn');
    const urlStatus = document.getElementById('url-status');

    async function createFromUrl() {
      const url = urlInput.value.trim();
      if (!url) return;

      // Find the first URL-capable scraper
      const scraper = scrapers.find(s => s.supports_url);
      if (!scraper) return;

      setStatus(urlStatus, 'loading', 'Fetching crossword…');
      urlBtn.disabled = true;

      try {
        const res = await fetch('/api/rooms/url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scraper: scraper.id, url }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to create room');
        location.href = `/room/${data.room_id}`;
      } catch (err) {
        setStatus(urlStatus, 'error', err.message);
        urlBtn.disabled = false;
      }
    }

    urlBtn.addEventListener('click', createFromUrl);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') createFromUrl(); });

    // ── File upload ───────────────────────────────────────────────────────

    const zone       = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const fileStatus = document.getElementById('file-status');

    zone.addEventListener('click', () => fileInput.click());
    zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) upload(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) upload(fileInput.files[0]); });

    async function upload(file) {
      setStatus(fileStatus, 'loading', 'Creating room…');
      const form = new FormData();
      form.append('file', file);
      try {
        const res = await fetch('/api/rooms', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Upload failed');
        location.href = `/room/${data.room_id}`;
      } catch (err) {
        setStatus(fileStatus, 'error', err.message);
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────

    function setStatus(el, type, msg) {
      el.className = `status ${type}`;
      el.textContent = msg;
    }

    // ── Boot ──────────────────────────────────────────────────────────────

    loadScrapers();

    // Reset loading state if browser restores page from bfcache (back button).
    window.addEventListener('pageshow', e => {
      if (!e.persisted) return;
      dateBtn.disabled = false;
      urlBtn.disabled  = false;
      setStatus(dateStatus, '', '');
      setStatus(urlStatus,  '', '');
    });
  </script>
</body>
</html>
