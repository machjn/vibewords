<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/theme.css">
  <title>VibeWords</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 2rem;
      /* Place the fixed top region (logo → tab bar) above the centre line so that,
         with the tab content flowing below it, the whole composition reads as
         centred. --above-centre (set in JS) is how much to sit above 50vh: the
         whole top region when tabbed — so the tab bar (the seam to the variable
         content) lands on the centre line — or half the card when there are no
         tabs (plain centring). Content below the seam just extends downward, so
         switching tabs or a growing list never moves anything above it. max()
         keeps a minimum top padding on short viewports. */
      padding: max(1.5rem, calc(50vh - var(--above-centre, 0px))) 1rem 1.5rem;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .tagline {
      color: var(--text-3);
      font-size: 1rem;
      margin-top: 0.25rem;
    }

    .col {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px var(--shadow);
    }

    /* ── Rooms button ── */
    .rooms-btn {
      display: block;
      width: 100%;
      max-width: 420px;
      padding: 0.7rem 1rem;
      background: var(--accent);
      color: var(--surface-2);
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .rooms-btn:hover { background: var(--accent-2); }

    /* ── Card heading ── */
    .card-heading {
      padding: 1rem 1.75rem 0.5rem;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      border-bottom: none;
    }

    .card-subheading {
      padding: 0 1.75rem 0.85rem;
      font-size: 0.8rem;
      color: var(--text-3);
      border-bottom: 2px solid var(--border);
    }

    /* ── Sections ── */
    .section {
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child { border-bottom: none; }

    .section-label {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .section-label span {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }

    .section-hint {
      font-size: 0.72rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text-4);
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    select, .text-input {
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      background: var(--surface);
    }

    select:focus, .text-input:focus { border-color: var(--accent); }
    .text-input::placeholder { color: var(--text-4); }

    .select-scraper { flex: 0 0 auto; min-width: 0; }
    .input-date     { flex: 1; min-width: 0; }
    .input-url      { flex: 1; min-width: 0; }

    /* ── File upload ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .upload-icon { font-size: 1.5rem; margin-bottom: 0.35rem; }

    .upload-zone p {
      color: var(--text-3);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .upload-zone strong { color: var(--text); }
    .upload-zone input[type="file"] { display: none; }

    /* ── Shared ── */
    .btn {
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: var(--surface-2);
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn:hover { background: var(--accent-2); }
    .btn:disabled { background: var(--text-3); cursor: not-allowed; }

    .status {
      font-size: 0.82rem;
      margin-top: 0.55rem;
      min-height: 1.1em;
    }
    .status.error   { color: var(--error); }
    .status.loading { color: var(--accent); }

    /* URL section dims when no URL-capable scraper is selected */
    .section.dimmed { opacity: 0.4; pointer-events: none; }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab-bar:empty { display: none; }

    .tab-btn {
      padding: 0.65rem 1rem;
      background: none;
      border: none;
      font: 600 0.82rem/1 inherit;
      color: var(--text-3);
      cursor: pointer;
      white-space: nowrap;
      /* inset box-shadow avoids being clipped by card's overflow:hidden */
      box-shadow: inset 0 -2px 0 transparent;
      transition: color 0.15s, box-shadow 0.15s;
    }

    .tab-btn:hover  { color: var(--text); }
    .tab-btn.active { color: var(--accent); box-shadow: inset 0 -2px 0 var(--accent); }

    /* ── Local puzzle list ── */
    .local-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      max-height: 240px;
      overflow-y: auto;
    }

    .local-puzzle-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 0.45rem 0.65rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--text);
      width: 100%;
      transition: background 0.12s, border-color 0.12s;
    }

    .local-puzzle-item:hover {
      background: var(--accent-subtle);
      border-color: var(--accent);
    }

    .local-puzzle-title { font-size: 0.88rem; font-weight: 600; }
    .local-puzzle-meta  { font-size: 0.75rem; color: var(--text-3); margin-top: 0.1rem; }

    @media (max-width: 360px) {
      .input-row { flex-wrap: wrap; }
      .input-row .btn { width: 100%; }
    }


    html[data-theme="neon"] body {
      background-image: url('/vibeword_bg1.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

  </style>
</head>
<body>
  <div class="col">
    <div class="logo">Vibe<span>Words</span></div>
    <p class="tagline">Collaborative crosswords, in real time</p>
  </div>

  <a href="/rooms" class="rooms-btn">View active rooms</a>

  <div class="card" id="create-card">
    <div class="card-heading" id="card-heading">Create a room</div>
    <p class="card-subheading">To create a room, select a crossword source</p>
    <div class="tab-bar" id="tab-bar"></div>
    <div id="tab-content"></div>
  </div>

  <div id="no-connectors-msg" style="display:none; width:100%; max-width:420px; background:var(--surface); border-radius:12px; box-shadow:0 2px 8px var(--shadow); padding:2rem 1.75rem; text-align:center; color:var(--text-3);">
    No connectors are enabled. Add at least one to <code>config.yaml</code>.
  </div>

  <div class="corner-bar">
    <button class="theme-btn" data-theme-btn onclick="openThemePicker(event)" title="Choose theme" aria-label="Choose theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
    </button>
    <a href="https://github.com/machjn/vibeword" class="github-link" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      machjn/vibeword
    </a>
  </div>

  <script>
    // ── Helpers ───────────────────────────────────────────────────────────

    function setStatus(el, type, msg) {
      if (!el) return;
      el.className = `status ${type}`;
      el.textContent = msg;
    }

    function escHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Connector metadata ────────────────────────────────────────────────

    let scrapers = [];
    let sources  = {};  // { source_id: { name, types: [scraper, …] } }

    async function loadScrapers() {
      const res = await fetch('/api/scrapers');
      scrapers = await res.json();

      sources = {};
      for (const s of scrapers) {
        if (!sources[s.source]) sources[s.source] = { name: s.source_name, types: [] };
        sources[s.source].types.push(s);
      }
    }

    // ── Tab management ────────────────────────────────────────────────────

    const TAB_KEY = 'vibewords_active_tab';

    function activateTab(id) {
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === id));
      document.querySelectorAll('.tab-panel').forEach(p =>
        p.style.display = p.dataset.tab === id ? '' : 'none');
      localStorage.setItem(TAB_KEY, id);
      if (id === 'local') loadLocalPuzzles();
    }

    function renderTabBar(tabs) {
      const bar = document.getElementById('tab-bar');
      if (tabs.length <= 1) return; // tab bar stays empty (hidden via :empty rule)
      bar.innerHTML = tabs.map(t =>
        `<button class="tab-btn" data-tab="${escHtml(t.id)}">${escHtml(t.label)}</button>`
      ).join('');
      bar.querySelectorAll('.tab-btn').forEach(btn =>
        btn.addEventListener('click', () => activateTab(btn.dataset.tab))
      );
    }

    // ── Scrape panel (combined source + type dropdowns) ───────────────────

    function buildScrapePanelHTML(scraperSources) {
      const today = new Date().toISOString().split('T')[0];
      const sourceOptions = Object.entries(scraperSources).map(([id, src]) =>
        `<option value="${escHtml(id)}">${escHtml(src.name)}</option>`
      ).join('');

      return `<div class="tab-panel" data-tab="scrape">
        <div class="section">
          <div class="section-label"><span>By date</span></div>
          <div class="input-row" style="margin-bottom:0.5rem">
            <select id="source-select" style="flex:1">${sourceOptions}</select>
            <select id="type-select" style="flex:1"></select>
          </div>
          <p id="scrape-schedule-hint" class="section-hint"
             style="margin-bottom:0.4rem;min-height:1em"></p>
          <div class="input-row">
            <input class="text-input input-date" type="date"
                   id="scrape-date-input" value="${today}" max="${today}">
            <button class="btn" id="scrape-date-btn">Go</button>
          </div>
          <p class="status" id="scrape-date-status"></p>
        </div>
        <div class="section" id="scrape-url-section">
          <div class="section-label"><span>From URL</span></div>
          <div class="input-row">
            <input class="text-input input-url" type="text"
                   id="scrape-url-input" placeholder="">
            <button class="btn" id="scrape-url-btn">Go</button>
          </div>
          <p class="status" id="scrape-url-status"></p>
        </div>
      </div>`;
    }

    function setupScrapePanel(scraperSources) {
      const sourceSel   = document.getElementById('source-select');
      const typeSel     = document.getElementById('type-select');
      const hint        = document.getElementById('scrape-schedule-hint');
      const dateInput   = document.getElementById('scrape-date-input');
      const dateBtn     = document.getElementById('scrape-date-btn');
      const dateStatus  = document.getElementById('scrape-date-status');
      const urlSection  = document.getElementById('scrape-url-section');
      const urlInput    = document.getElementById('scrape-url-input');
      const urlBtn      = document.getElementById('scrape-url-btn');
      const urlStatus   = document.getElementById('scrape-url-status');

      function currentSource() { return scraperSources[sourceSel.value]; }
      function selectedScraper() { return scrapers.find(s => s.id === typeSel.value) || null; }

      function updateTypeDropdown() {
        const src = currentSource();
        typeSel.innerHTML = (src?.types || []).map(s =>
          `<option value="${escHtml(s.id)}">${escHtml(s.name)}</option>`
        ).join('');
        updateHintAndUrl();
      }

      function updateHintAndUrl() {
        const s = selectedScraper();
        hint.textContent = s?.schedule ? `Publishes ${s.schedule}` : '';
        const hasUrl = currentSource()?.types.some(t => t.supports_url) ?? false;
        urlSection.style.display = hasUrl ? '' : 'none';
        if (hasUrl) {
          urlInput.placeholder = sourceSel.value === 'guardian'
            ? 'https://www.theguardian.com/crosswords/… or 30013'
            : 'Puzzle URL…';
        }
      }

      sourceSel.addEventListener('change', updateTypeDropdown);
      typeSel.addEventListener('change', updateHintAndUrl);
      updateTypeDropdown();

      async function doDate() {
        const scraperEntry = selectedScraper();
        const d = dateInput.value;
        if (!scraperEntry || !d) return;
        setStatus(dateStatus, 'loading', 'Fetching crossword…');
        dateBtn.disabled = true;
        try {
          const res = await fetch('/api/rooms/date', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scraper: scraperEntry.id, date: d }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Failed to create room');
          location.href = `/room/${data.room_id}`;
        } catch (err) {
          setStatus(dateStatus, 'error', err.message);
          dateBtn.disabled = false;
        }
      }
      dateBtn.addEventListener('click', doDate);
      dateInput.addEventListener('keydown', e => { if (e.key === 'Enter') doDate(); });

      async function doUrl() {
        const url = urlInput.value.trim();
        if (!url) return;
        const urlScraper = currentSource()?.types.find(s => s.supports_url);
        if (!urlScraper) return;
        setStatus(urlStatus, 'loading', 'Fetching crossword…');
        urlBtn.disabled = true;
        try {
          const res = await fetch('/api/rooms/url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scraper: urlScraper.id, url }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Failed to create room');
          location.href = `/room/${data.room_id}`;
        } catch (err) {
          setStatus(urlStatus, 'error', err.message);
          urlBtn.disabled = false;
        }
      }
      urlBtn.addEventListener('click', doUrl);
      urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') doUrl(); });
    }

    // ── Local panel ───────────────────────────────────────────────────────

    let localPuzzlesLoaded = false;

    async function loadLocalPuzzles() {
      if (localPuzzlesLoaded) return;
      const list   = document.getElementById('local-list');
      const status = document.getElementById('local-status');
      setStatus(status, 'loading', 'Loading puzzles…');
      try {
        const res     = await fetch('/api/local-puzzles');
        const puzzles = await res.json();
        localPuzzlesLoaded = true;
        setStatus(status, '', '');
        if (puzzles.length === 0) {
          setStatus(status, '', 'No puzzles found in the local library.');
          return;
        }
        list.innerHTML = puzzles.map(p => {
          const meta = [p.date, p.publisher].filter(Boolean).join(' · ');
          return `<button class="local-puzzle-item" data-path="${escHtml(p.id)}">
            <span class="local-puzzle-title">${escHtml(p.title || p.id)}</span>
            ${meta ? `<span class="local-puzzle-meta">${escHtml(meta)}</span>` : ''}
          </button>`;
        }).join('');
        list.querySelectorAll('.local-puzzle-item').forEach(btn =>
          btn.addEventListener('click', () => createFromLocal(btn.dataset.path))
        );
      } catch (err) {
        setStatus(status, 'error', 'Could not load local puzzles.');
      }
    }

    async function createFromLocal(path) {
      const status  = document.getElementById('local-status');
      setStatus(status, 'loading', 'Creating room…');
      try {
        const res = await fetch('/api/rooms/local', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to create room');
        location.href = `/room/${data.room_id}`;
      } catch (err) {
        setStatus(status, 'error', err.message);
      }
    }

    // ── Upload panel ──────────────────────────────────────────────────────

    function setupUploadZone() {
      const zone       = document.getElementById('drop-zone');
      const fileInput  = document.getElementById('file-input');
      const fileStatus = document.getElementById('file-status');

      zone.addEventListener('click', () => fileInput.click());
      zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) doUpload(fileInput.files[0]);
      });

      async function doUpload(file) {
        setStatus(fileStatus, 'loading', 'Creating room…');
        const form = new FormData();
        form.append('file', file);
        try {
          const res = await fetch('/api/rooms', { method: 'POST', body: form });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Upload failed');
          location.href = `/room/${data.room_id}`;
        } catch (err) {
          setStatus(fileStatus, 'error', err.message);
        }
      }
    }

    // ── UI assembly ───────────────────────────────────────────────────────

    // Measure the fixed top region (logo → bottom of the tab bar) and store how
    // much of it should sit above the viewport's centre line (see CSS
    // --above-centre): the whole region when tabbed (so the tab bar — the seam to
    // the variable content — lands on the centre line, content below it), or half
    // the card when there are no tabs (the card is simply centred). Only this
    // constant top region is ever measured — never the per-tab content — so
    // switching tabs or a growing list never moves anything above the seam. The
    // span is independent of the padding it feeds, so the result is stable.
    function positionTopBlock() {
      const top = document.querySelector('.col')?.getBoundingClientRect().top ?? 0;
      const tabBar = document.getElementById('tab-bar');
      const tabbed = !!(tabBar && tabBar.offsetHeight > 0);
      const anchor = tabbed ? tabBar : document.querySelector('.card');
      if (!anchor) return;
      const span = anchor.getBoundingClientRect().bottom - top;
      document.documentElement.style.setProperty('--above-centre', (tabbed ? span : span / 2) + 'px');
    }

    function buildUI(appCfg) {
      const content  = document.getElementById('tab-content');
      const hasLocal = !!sources['local'];
      const tabs     = [];

      // Inject upload panel
      if (appCfg.ipuz_enabled) {
        content.insertAdjacentHTML('beforeend', `
          <div class="tab-panel" data-tab="upload">
            <div class="section">
              <div class="section-label"><span>Upload .ipuz</span></div>
              <div class="upload-zone" id="drop-zone">
                <div class="upload-icon">&#9635;</div>
                <p><strong>Drop an .ipuz file here</strong><br>or click to choose one</p>
                <input type="file" id="file-input" accept=".ipuz,application/json">
              </div>
              <p class="status" id="file-status"></p>
            </div>
          </div>`);
        setupUploadZone();
        tabs.push({ id: 'upload', label: 'Upload' });
      }

      // Inject local panel
      if (hasLocal) {
        content.insertAdjacentHTML('beforeend', `
          <div class="tab-panel" data-tab="local">
            <div class="section">
              <div class="section-label"><span>Local library</span></div>
              <div id="local-list" class="local-list"></div>
              <p class="status" id="local-status"></p>
            </div>
          </div>`);
        tabs.push({ id: 'local', label: 'Local' });
      }

      // Inject combined scrape panel for all non-local sources
      const scraperSources = Object.fromEntries(
        Object.entries(sources).filter(([id]) => id !== 'local')
      );
      if (Object.keys(scraperSources).length > 0) {
        content.insertAdjacentHTML('beforeend', buildScrapePanelHTML(scraperSources));
        setupScrapePanel(scraperSources);
        tabs.push({ id: 'scrape', label: 'Scrape' });
      }

      renderTabBar(tabs);

      // Place the fixed top region above centre; content hangs below it (see CSS).
      // Re-measured on resize because the region's height changes if it rewraps.
      positionTopBlock();
      window.addEventListener('resize', positionTopBlock);

      // Activate saved or first tab
      const savedTab = localStorage.getItem(TAB_KEY);
      const initial  = (savedTab && tabs.find(t => t.id === savedTab)) ? savedTab : tabs[0]?.id;
      if (initial) activateTab(initial);
    }

    // ── Boot ──────────────────────────────────────────────────────────────

    async function init() {
      const [, appCfg] = await Promise.all([
        loadScrapers(),
        fetch('/api/config').then(r => r.json()).catch(() => ({})),
      ]);

      const hasScrapers = scrapers.some(s => s.source !== 'local');
      const hasLocal    = scrapers.some(s => s.source === 'local');

      if (!hasScrapers && !hasLocal && !appCfg.ipuz_enabled) {
        document.getElementById('create-card').style.display = 'none';
        document.getElementById('no-connectors-msg').style.display = '';
        return;
      }

      buildUI(appCfg);
    }

    init();

    // Reset loading state if browser restores page from bfcache (back button).
    window.addEventListener('pageshow', e => {
      if (!e.persisted) return;
      document.querySelectorAll('.btn').forEach(btn => btn.disabled = false);
      document.querySelectorAll('.status').forEach(el => setStatus(el, '', ''));
    });
  </script>
</body>
</html>
