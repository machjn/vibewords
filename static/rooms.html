<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/theme.css">
  <title>Rooms — VibeWord</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .logo { font-weight: 800; font-size: 1.1rem; color: var(--accent); letter-spacing: -0.5px; text-decoration: none; }

    .header-title { font-weight: 600; color: var(--text); flex: 1; }

    .nav-link {
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-link:hover { text-decoration: underline; }

    main {
      flex: 1;
      padding: 2rem 1.5rem;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    h1 { font-size: 1.3rem; font-weight: 700; color: var(--text); }

    .refresh-info { display: none; }

    /* ── Table ── */
    .rooms-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px var(--shadow);
    }

    .rooms-table th {
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
      padding: 0.65rem 1rem;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .rooms-table td {
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      color: var(--text-2);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .rooms-table tr:last-child td { border-bottom: none; }

    .rooms-table tbody tr:hover td { background: var(--surface-2); }

    .puzzle-title { font-weight: 600; color: var(--text); }
    .puzzle-author { font-size: 0.78rem; color: var(--text-3); margin-top: 1px; }
    .puzzle-room-id { font-size: 0.75rem; color: var(--text-4); margin-top: 2px; font-family: ui-monospace, monospace; }

    .size-badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      background: var(--surface-3);
      border-radius: 4px;
      font-size: 0.78rem;
      color: var(--text-3);
      white-space: nowrap;
    }

    .players-cell { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }

    .player-chip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.15rem 0.45rem;
      background: var(--surface-3);
      border-radius: 10px;
      font-size: 0.78rem;
      color: var(--text-2);
    }

    .player-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .no-players { color: var(--text-4); font-style: italic; font-size: 0.82rem; }

    .age { color: var(--text-3); font-size: 0.82rem; white-space: nowrap; }

    .join-btn {
      padding: 0.3rem 0.8rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .join-btn:hover { background: var(--accent-2); }

    /* ── Empty state ── */
    .empty {
      background: var(--surface);
      border-radius: 10px;
      padding: 3rem 2rem;
      text-align: center;
      color: var(--text-3);
      box-shadow: 0 1px 4px var(--shadow);
    }

    .empty p { margin-bottom: 1rem; }

    .create-link {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      background: var(--accent);
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .create-link:hover { background: var(--accent-2); }

    /* ── Responsive ── */
    @media (max-width: 620px) {
      main { padding: 1rem 0.75rem; }

      /* Hide Size and Last active — show Puzzle, Players, Join */
      .rooms-table th:nth-child(2),
      .rooms-table td:nth-child(2),
      .rooms-table th:nth-child(4),
      .rooms-table td:nth-child(4) { display: none; }

      .rooms-table td { padding: 0.65rem 0.75rem; }
      .rooms-table th { padding: 0.5rem 0.75rem; }
    }

    @media (max-width: 420px) {
      /* Also hide Players — just Puzzle + Join */
      .rooms-table th:nth-child(3),
      .rooms-table td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">VibeWord</a>
    <span class="header-title">Active Rooms</span>
    <a class="nav-link" href="/">+ New room</a>
  </header>

  <main>
    <div class="page-header">
      <h1>Rooms</h1>
      <span class="refresh-info" id="refresh-info"></span>
    </div>
    <div id="content"></div>
  </main>

  <script>
    const REFRESH_INTERVAL = 10_000;
    let lastFetch = null;

    function relativeTime(epochSeconds) {
      const diff = Math.floor(Date.now() / 1000 - epochSeconds);
      if (diff < 60)  return 'just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      return `${Math.floor(diff / 3600)}h ago`;
    }

    function renderRooms(rooms) {
      const el = document.getElementById('content');

      if (!rooms.length) {
        el.innerHTML = `
          <div class="empty">
            <p>No active rooms yet.</p>
            <a class="create-link" href="/">Create one</a>
          </div>`;
        return;
      }

      const rows = rooms.map(r => {
        const players = r.players.length
          ? r.players.map(p =>
              `<span class="player-chip">
                <span class="player-dot" style="background:${p.color}"></span>
                ${esc(p.name)}
              </span>`).join('')
          : '<span class="no-players">Empty</span>';

        return `
          <tr>
            <td>
              <div class="puzzle-title">${esc(r.title)}</div>
              ${r.author ? `<div class="puzzle-author">by ${esc(r.author)}</div>` : ''}
              <div class="puzzle-room-id">${esc(r.room_id)}</div>
            </td>
            <td><span class="size-badge">${r.width}&times;${r.height}</span></td>
            <td><div class="players-cell">${players}</div></td>
            <td class="age">${relativeTime(r.last_activity)}</td>
            <td><a class="join-btn" href="/room/${r.room_id}">Join</a></td>
          </tr>`;
      }).join('');

      el.innerHTML = `
        <table class="rooms-table">
          <thead>
            <tr>
              <th>Puzzle</th>
              <th>Size</th>
              <th>Players</th>
              <th>Last active</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function updateRefreshInfo() {
      if (!lastFetch) return;
      const ago = Math.round((Date.now() - lastFetch) / 1000);
      document.getElementById('refresh-info').textContent =
        `Updated ${ago === 0 ? 'just now' : ago + 's ago'} · refreshes every ${REFRESH_INTERVAL / 1000}s`;
    }

    async function load() {
      try {
        const res = await fetch('/api/rooms');
        const data = await res.json();
        renderRooms(data);
        lastFetch = Date.now();
        updateRefreshInfo();
      } catch (e) {
        document.getElementById('content').textContent = 'Failed to load rooms.';
      }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    load();
    setInterval(load, REFRESH_INTERVAL);
    setInterval(updateRefreshInfo, 5_000);
  </script>

  <div class="corner-bar">
    <button class="theme-btn" data-theme-btn onclick="openThemePicker(event)" title="Choose theme" aria-label="Choose theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
    </button>
    <a href="https://github.com/machjn/vibeword" class="github-link" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      machjn/vibeword
    </a>
  </div>
</body>
</html>
