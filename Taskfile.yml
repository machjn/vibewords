version: '3'

vars:
  REGISTRY: europe-west1-docker.pkg.dev/vibewords-0/vibewords/vibewords
  REGION: europe-west1
  DEFAULT_SERVICE: vibewords

tasks:
  bump:patch:
    desc: Bump the patch version in pyproject.toml (0.0.X)
    silent: true
    cmd: |
      VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
      MAJOR=$(echo $VERSION | cut -d. -f1)
      MINOR=$(echo $VERSION | cut -d. -f2)
      PATCH=$(echo $VERSION | cut -d. -f3)
      NEW="$MAJOR.$MINOR.$((PATCH + 1))"
      sed -i "s/^version = \"$VERSION\"/version = \"$NEW\"/" pyproject.toml
      echo "Bumped $VERSION → $NEW"

  bump:minor:
    desc: Bump the minor version in pyproject.toml (0.X.0)
    silent: true
    cmd: |
      VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
      MAJOR=$(echo $VERSION | cut -d. -f1)
      MINOR=$(echo $VERSION | cut -d. -f2)
      NEW="$MAJOR.$((MINOR + 1)).0"
      sed -i "s/^version = \"$VERSION\"/version = \"$NEW\"/" pyproject.toml
      echo "Bumped $VERSION → $NEW"

  bump:major:
    desc: Bump the major version in pyproject.toml (X.0.0)
    silent: true
    cmd: |
      VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
      MAJOR=$(echo $VERSION | cut -d. -f1)
      NEW="$((MAJOR + 1)).0.0"
      sed -i "s/^version = \"$VERSION\"/version = \"$NEW\"/" pyproject.toml
      echo "Bumped $VERSION → $NEW"

  install:hooks:
    desc: Install git hooks from scripts/ into .git/hooks/
    cmd: |
      cp scripts/pre-commit .git/hooks/pre-commit
      chmod +x .git/hooks/pre-commit
      echo "Installed pre-commit hook"

  dev:
    desc: Run the dev server with live reload
    env:
      VIBEWORDS_CONFIG: ./config/config-local.yaml
    cmd: uvicorn vibewords.main:app --reload --host 0.0.0.0 --port 9000

  dev:debug:
    desc: Run the dev server with debug logging
    cmd: LOG_LEVEL=DEBUG uvicorn vibewords.main:app --reload

  install:
    desc: Install the package in editable mode
    cmd: pip install -e .

  image:tag:
    desc: Print the default image tag (version + short SHA)
    silent: true
    cmd: |
      VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
      SHA=$(git rev-parse --short HEAD)
      echo "${VERSION}-${SHA}"

  build:
    desc: Build and push the Docker image for a single tag. Requires IMAGE_TAG.
    requires:
      vars: [IMAGE_TAG]
    cmds:
      - docker build --build-arg VIBEWORDS_ENV=local -t {{.REGISTRY}}:{{.IMAGE_TAG}} .
      - docker push {{.REGISTRY}}:{{.IMAGE_TAG}}

  build-ci:
    desc: Build and push the Docker image with version and latest tags. Requires IMAGE_TAG.
    requires:
      vars: [IMAGE_TAG]
    vars:
      VERSION:
        sh: grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/'
    cmds:
      - docker build
          --build-arg VIBEWORDS_ENV=prod
          -t {{.REGISTRY}}:{{.IMAGE_TAG}}
          -t {{.REGISTRY}}:{{.VERSION}}
          -t {{.REGISTRY}}:latest
          .
      - docker push {{.REGISTRY}}:{{.IMAGE_TAG}}
      - docker push {{.REGISTRY}}:{{.VERSION}}
      - docker push {{.REGISTRY}}:latest

  deploy:
    desc: |
      Deploy an image to Cloud Run.
        IMAGE_TAG  (required) — the image tag to deploy
        SERVICE    (optional) — Cloud Run service name (default: {{.DEFAULT_SERVICE}})
    requires:
      vars: [IMAGE_TAG]
    vars:
      SERVICE: '{{.SERVICE | default .DEFAULT_SERVICE}}'
    cmd: |
      gcloud run deploy {{.SERVICE}} \
        --image {{.REGISTRY}}:{{.IMAGE_TAG}} \
        --platform managed \
        --region {{.REGION}} \
        --timeout 3600 \
        --allow-unauthenticated \
        --min-instances=1 \
        --max-instances=1

  build-and-deploy:
    desc: Build, push, and deploy in one step. Requires IMAGE_TAG; optionally SERVICE.
    requires:
      vars: [IMAGE_TAG]
    cmds:
      - task: build
        vars: { IMAGE_TAG: '{{.IMAGE_TAG}}' }
      - task: deploy
        vars: { IMAGE_TAG: '{{.IMAGE_TAG}}', SERVICE: '{{.SERVICE}}' }
